<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DocFind — 연구하는 의사를 찾다</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F5F0; --surface: #FFFFFF; --text: #1A1A1A; --muted: #6B6B6B;
    --accent: #1D4ED8; --accent-light: #EEF2FF; --border: #E5E2DA; --tag-bg: #F0EDE6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header { padding: 24px 40px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); background: var(--surface); }
  .logo { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--text); }
  .logo span { color: var(--accent); }
  .disclaimer { font-size: 11px; color: var(--muted); background: var(--tag-bg); padding: 4px 10px; border-radius: 20px; }

  .hero { max-width: 680px; margin: 70px auto 0; padding: 0 24px; text-align: center; }
  .hero h1 { font-family: 'DM Serif Display', serif; font-size: 42px; line-height: 1.15; letter-spacing: -1px; margin-bottom: 16px; }
  .hero p { font-size: 15px; color: var(--muted); line-height: 1.6; margin-bottom: 36px; }

  .search-wrap { display: flex; gap: 10px; background: var(--surface); border: 1.5px solid var(--border); border-radius: 14px; padding: 8px 8px 8px 20px; box-shadow: 0 4px 24px rgba(0,0,0,0.06); transition: border-color 0.2s; }
  .search-wrap:focus-within { border-color: var(--accent); }
  .search-wrap input { flex: 1; border: none; outline: none; font-family: 'DM Sans', sans-serif; font-size: 16px; background: transparent; color: var(--text); }
  .search-wrap input::placeholder { color: #B0ADA6; }
  .search-btn { background: var(--accent); color: white; border: none; border-radius: 10px; padding: 12px 24px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.2s; white-space: nowrap; }
  .search-btn:hover { background: #1E40AF; }
  .search-btn:disabled { background: #9CA3AF; cursor: not-allowed; }

  .suggestions { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 16px; }
  .sug-tag { font-size: 12px; color: var(--muted); background: var(--tag-bg); border: 1px solid var(--border); border-radius: 20px; padding: 5px 12px; cursor: pointer; transition: all 0.15s; }
  .sug-tag:hover { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }

  .results-section { max-width: 900px; margin: 48px auto 80px; padding: 0 24px; }
  .results-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 16px; }
  .results-title { font-family: 'DM Serif Display', serif; font-size: 22px; }
  .results-meta { font-size: 12px; color: var(--muted); }

  .source-badges { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
  .source-badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; background: var(--tag-bg); color: var(--muted); border: 1px solid var(--border); }
  .source-badge.active { background: var(--accent-light); color: var(--accent); border-color: #BFDBFE; }

  .note-box { background: var(--accent-light); border: 1px solid #BFDBFE; border-radius: 10px; padding: 12px 16px; font-size: 12px; color: #1E40AF; margin-bottom: 20px; line-height: 1.6; }

  .loading { text-align: center; padding: 60px 0; color: var(--muted); font-size: 14px; }
  .loading-step { font-size: 12px; color: var(--muted); margin-top: 8px; }
  .spinner { width: 28px; height: 28px; border: 2.5px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 14px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .no-results { text-align: center; padding: 60px 0; color: var(--muted); font-size: 14px; line-height: 1.8; }
  .error-box { background: #FEF2F2; border: 1px solid #FCA5A5; border-radius: 12px; padding: 20px; text-align: center; color: #DC2626; font-size: 14px; }

  /* 테이블 */
  .results-table { width: 100%; border-collapse: collapse; background: var(--surface); border-radius: 14px; overflow: hidden; border: 1px solid var(--border); }
  .results-table thead tr { background: var(--tag-bg); }
  .results-table th { padding: 12px 16px; text-align: left; font-size: 12px; font-weight: 500; color: var(--muted); cursor: pointer; user-select: none; white-space: nowrap; border-bottom: 1px solid var(--border); transition: color 0.15s; }
  .results-table th:hover { color: var(--accent); }
  .results-table th.sorted { color: var(--accent); }
  .sort-icon { margin-left: 4px; font-size: 10px; opacity: 0.5; }
  .sort-icon.active { opacity: 1; }

  .results-table tbody tr { border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s; }
  .results-table tbody tr:last-child { border-bottom: none; }
  .results-table tbody tr:hover { background: var(--bg); }
  .results-table tbody tr.expanded { background: var(--bg); }

  .results-table td { padding: 14px 16px; font-size: 14px; vertical-align: middle; }
  .td-rank { font-family: 'DM Serif Display', serif; font-size: 16px; color: var(--muted); width: 40px; text-align: center; }
  .td-rank.top { color: var(--accent); }
  .td-name { font-weight: 500; }
  .td-affil { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .td-num { font-weight: 500; }
  .td-num.highlight { color: var(--accent); }
  .td-year { color: var(--muted); font-size: 13px; }

  /* 확장 행 */
  .detail-row { display: none; }
  .detail-row.open { display: table-row; }
  .detail-cell { padding: 0 !important; }
  .detail-inner { padding: 16px 20px 20px; border-top: 1px solid var(--border); background: var(--bg); }

  .hospital-box { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; margin-bottom: 14px; }
  .hospital-box-title { font-size: 11px; font-weight: 500; color: var(--muted); margin-bottom: 8px; }
  .hospital-stats { display: flex; gap: 20px; flex-wrap: wrap; }
  .hospital-stat-val { font-size: 13px; font-weight: 500; color: var(--accent); }
  .hospital-stat-lbl { font-size: 10px; color: var(--muted); margin-top: 1px; }

  .papers-title { font-size: 12px; font-weight: 500; color: var(--muted); margin-bottom: 8px; }
  .paper-item { padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; line-height: 1.5; }
  .paper-item:last-child { border-bottom: none; }
  .paper-title-link { color: var(--text); text-decoration: none; font-weight: 500; }
  .paper-title-link:hover { color: var(--accent); }
  .paper-meta { font-size: 11px; color: var(--muted); margin-top: 3px; display: flex; gap: 8px; flex-wrap: wrap; }
  .paper-cite { font-size: 10px; padding: 1px 6px; border-radius: 8px; background: var(--accent-light); color: var(--accent); }

  .info-btn { width: 14px; height: 14px; border-radius: 50%; background: var(--border); color: var(--muted); font-size: 9px; font-weight: 500; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; border: none; font-family: 'DM Sans', sans-serif; flex-shrink: 0; position: relative; vertical-align: middle; margin-left: 3px; }
  .info-btn:hover .tooltip { display: block; }
  .tooltip { display: none; position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1A1A1A; color: #fff; font-size: 11px; padding: 6px 10px; border-radius: 8px; white-space: nowrap; z-index: 10; line-height: 1.5; pointer-events: none; }
  .tooltip::after { content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border: 5px solid transparent; border-top-color: #1A1A1A; }
</style>
</head>
<body>

<header>
  <div class="logo">doc<span>find</span></div>
  <span class="disclaimer">연구 활동 기반 정보 제공 · 진료 추천 아님</span>
</header>

<div class="hero">
  <h1>연구하는 의사를<br>찾아드립니다</h1>
  <p>병명 또는 약명을 입력하면 관련 논문을 가장 많이 발표한<br>국내 의사를 연구 활동 지수로 보여드립니다.</p>
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="예: 위암, 췌장암, 글리벡..." autocomplete="off" />
    <button class="search-btn" id="searchBtn" onclick="doSearch()">검색</button>
  </div>
  <div class="suggestions">
    <span class="sug-tag" onclick="quickSearch('위암')">위암</span>
    <span class="sug-tag" onclick="quickSearch('췌장암')">췌장암</span>
    <span class="sug-tag" onclick="quickSearch('폐암')">폐암</span>
    <span class="sug-tag" onclick="quickSearch('간암')">간암</span>
    <span class="sug-tag" onclick="quickSearch('백혈병')">백혈병</span>
    <span class="sug-tag" onclick="quickSearch('뇌종양')">뇌종양</span>
  </div>
</div>

<div class="results-section" id="resultsSection" style="display:none"></div>

<script>
const HIRA_PROXY = 'https://hira-proxy.kimnabin01.workers.dev';

const TERM_MAP = {
  '위암':'gastric cancer','췌장암':'pancreatic cancer','폐암':'lung cancer',
  '간암':'hepatocellular carcinoma','백혈병':'leukemia','뇌종양':'brain tumor',
  '대장암':'colorectal cancer','유방암':'breast cancer','전립선암':'prostate cancer',
  '갑상선암':'thyroid cancer','글리벡':'imatinib','허셉틴':'trastuzumab',
  '담낭암':'gallbladder cancer','식도암':'esophageal cancer','방광암':'bladder cancer',
  '신장암':'renal cell carcinoma','자궁경부암':'cervical cancer','난소암':'ovarian cancer',
};

const DEPT_MAP = {
  '위암':'03','췌장암':'03','간암':'03','대장암':'03','식도암':'03','담낭암':'03',
  '폐암':'10','백혈병':'15','뇌종양':'11','유방암':'21',
  '전립선암':'22','방광암':'22','신장암':'22',
  '갑상선암':'03','난소암':'18','자궁경부암':'18',
};

// 한국 성씨 (영문)
const KR_SURNAMES = new Set([
  'kim','lee','park','choi','jung','kang','yoon','jang','lim','han','oh','shin','kwon',
  'hwang','ahn','song','ryu','hong','jeon','ko','moon','yang','son','bae','cho','baek',
  'heo','nam','sim','noh','ha','yoo','jeon','chun','yu','seo','im','min','eom','cha',
  'wi','pi','gong','bang','koo','woo','gil','ryoo','keum','je','seok','maeng','um',
]);

const KR_KEYWORDS = [
  'korea','seoul','busan','daejeon','daegu','incheon','gwangju','ulsan','suwon',
  'yonsei','samsung medical','asan medical','severance','snuh','kaist','postech',
  'hanyang','ajou','konkuk','kyung hee','ewha','sungkyunkwan','chung-ang',
  'chonnam','pusan national','gachon','inha','hallym','dongguk','catholic university of korea',
  'national cancer center','korea university','chosun','keimyung','yeungnam',
  'inje','dankook','wonkwang','chonbuk','jeonbuk',
];

const FOREIGN_KEYWORDS = [
  'japan','tokyo','osaka','kyoto','nagoya','yokohama','fukuoka','hokkaido',
  'china','beijing','shanghai','guangzhou','taiwan','hong kong',
  'united states','usa','new york','boston','california','stanford','harvard','mayo',
  'united kingdom','london','oxford','cambridge','germany','france','australia',
  'singapore','india','italy','spain','netherlands','sweden','denmark','switzerland',
];

function isKorean(s) {
  if (!s) return false;
  const a = s.toLowerCase();
  if (FOREIGN_KEYWORDS.some(k => a.includes(k))) return false;
  return KR_KEYWORDS.some(k => a.includes(k));
}

function isKoreanName(fullName) {
  // 성씨가 한국 성씨면 한국인으로 판단
  const surname = fullName.split(' ')[0].toLowerCase();
  return KR_SURNAMES.has(surname);
}

const HOSPITAL_MAP = [
  ['Samsung Medical','삼성서울병원'],['Asan Medical','서울아산병원'],
  ['Severance','세브란스병원'],['Seoul National University Bundang','분당서울대병원'],
  ['Seoul National University','서울대학교병원'],['SNUH','서울대학교병원'],
  ['National Cancer Center','국립암센터'],['Yonsei','연세대학교세브란스병원'],
  ['Catholic University of Korea','가톨릭대학교서울성모병원'],['Hanyang','한양대학교병원'],
  ['Ajou','아주대학교병원'],['Sungkyunkwan','삼성서울병원'],
  ['Kyung Hee','경희대학교병원'],['Ewha','이화여자대학교목동병원'],
  ['Chung-Ang','중앙대학교병원'],['Konkuk','건국대학교병원'],
  ['Gachon','가천대길병원'],['Inha','인하대학교병원'],
  ['Hallym','한림대학교성심병원'],['Pusan National','부산대학교병원'],
  ['Chonnam','전남대학교병원'],['Korea University','고려대학교안암병원'],
  ['Chonbuk','전북대학교병원'],['Jeonbuk','전북대학교병원'],
  ['Keimyung','계명대학교동산병원'],['Yeungnam','영남대학교병원'],
  ['Dankook','단국대학교병원'],['KAIST','KAIST'],['POSTECH','POSTECH'],
];

// 심평원 검색용 정확한 병원명 매핑
const HIRA_NAME_MAP = {
  '삼성서울병원': '삼성서울병원',
  '서울아산병원': '서울아산병원',
  '세브란스병원': '세브란스병원',
  '연세대학교세브란스병원': '세브란스병원',
  '분당서울대병원': '서울대학교병원 분당',
  '서울대학교병원': '서울대학교병원',
  '국립암센터': '국립암센터',
  '가톨릭대학교서울성모병원': '서울성모병원',
  '한양대학교병원': '한양대학교병원',
  '아주대학교병원': '아주대학교병원',
  '경희대학교병원': '경희대학교병원',
  '이화여자대학교목동병원': '이화여자대학교목동병원',
  '중앙대학교병원': '중앙대학교병원',
  '건국대학교병원': '건국대학교병원',
  '가천대길병원': '가천대학교길병원',
  '인하대학교병원': '인하대학교병원',
  '한림대학교성심병원': '한림대학교성심병원',
  '부산대학교병원': '부산대학교병원',
  '전남대학교병원': '전남대학교병원',
  '고려대학교안암병원': '고려대학교안암병원',
  '전북대학교병원': '전북대학교병원',
  '계명대학교동산병원': '계명대학교동산병원',
  '영남대학교병원': '영남대학교병원',
  '단국대학교병원': '단국대학교병원',
};

function extractHospital(s) {
  if (!s) return '';
  for (const [k,v] of HOSPITAL_MAP) if (s.includes(k)) return v;
  const parts = s.split(',');
  return (parts[parts.length>1?1:0]||'').trim().slice(0,35);
}

function toEnglish(q) { return TERM_MAP[q.trim()] || q.trim(); }
function quickSearch(t) { document.getElementById('searchInput').value = t; doSearch(); }
document.getElementById('searchInput').addEventListener('keydown', e => { if (e.key==='Enter') doSearch(); });

// 전역 상태
let allDoctors = [];
let sortKey = 'citationCount';
let sortDir = -1; // -1: 내림차순, 1: 오름차순
let hospitalInfoMap = {};

function setStep(msg) {
  document.getElementById('resultsSection').innerHTML =
    `<div class="loading"><div class="spinner"></div>논문 데이터를 불러오는 중...<div class="loading-step">${msg}</div></div>`;
}

async function doSearch() {
  const raw = document.getElementById('searchInput').value.trim();
  if (!raw) return;
  const query = toEnglish(raw);
  const btn = document.getElementById('searchBtn');
  const section = document.getElementById('resultsSection');

  btn.disabled = true; btn.textContent = '검색 중...';
  section.style.display = 'block';
  setStep('PubMed에서 한국 의사 검색 중...');

  try {
    const doctors = await fetchPubmed(query);
    if (!Object.keys(doctors).length) {
      section.innerHTML = `<div class="no-results">한국 소속 연구자를 찾지 못했습니다.<br>다른 검색어를 시도해보세요.</div>`;
      return;
    }

    const pmids = [], doiMap = {};
    for (const doc of Object.values(doctors)) {
      doc.papers.forEach(p => {
        if (p.pmid) pmids.push(p.pmid);
        if (p.doi) doiMap[p.doi] = p;
      });
    }

    setStep('피인용수 확인 중...');
    const [europePmcCites, crossrefCites, openCites] = await Promise.all([
      fetchEuropePMC(pmids),
      fetchCrossRef(Object.keys(doiMap)),
      fetchOpenCitations(pmids),
    ]);

    for (const doc of Object.values(doctors)) {
      doc.papers.forEach(p => {
        const c = Math.max(
          europePmcCites[p.pmid]||0,
          p.doi?(crossrefCites[p.doi]||0):0,
          openCites[p.pmid]||0
        );
        p.citationCount = c;
        doc.citationCount += c;
      });
    }

    setStep('병원 정보 확인 중 (심평원)...');
    const deptCode = DEPT_MAP[raw] || '';
    hospitalInfoMap = await fetchHiraViaProxy(doctors, deptCode);

    allDoctors = Object.values(doctors);
    allDoctors.forEach(d => d.papers.sort((a,b)=>b.year-a.year));

    sortKey = 'citationCount';
    sortDir = -1;
    renderTable(raw, hospitalInfoMap);
  } catch(e) {
    console.error(e);
    section.innerHTML = `<div class="error-box">데이터를 불러오는 중 오류가 발생했습니다.<br>잠시 후 다시 시도해주세요.</div>`;
  } finally {
    btn.disabled = false; btn.textContent = '검색';
  }
}

// ── PubMed ────────────────────────────────────────────
async function fetchPubmed(query) {
  const map = {};
  const ids = await fetch(
    `https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esearch.fcgi?db=pubmed&term=${encodeURIComponent(query+'[Title/Abstract] AND Korea[Affiliation]')}&retmax=80&sort=relevance&retmode=json`
  ).then(r=>r.json()).then(d=>d.esearchresult?.idlist||[]);
  if (!ids.length) return map;

  const xmlText = await fetch(
    `https://eutils.ncbi.nlm.nih.gov/entrez/eutils/efetch.fcgi?db=pubmed&id=${ids.join(',')}&retmode=xml`
  ).then(r=>r.text());
  const xml = new DOMParser().parseFromString(xmlText,'text/xml');

  xml.querySelectorAll('PubmedArticle').forEach(article => {
    const pmid = article.querySelector('PMID')?.textContent||'';
    const title = article.querySelector('ArticleTitle')?.textContent||'';
    const yearEl = article.querySelector('PubDate Year')||article.querySelector('PubDate MedlineDate');
    const year = parseInt(yearEl?.textContent?.slice(0,4)||'0');
    const journal = article.querySelector('Journal Title')?.textContent||article.querySelector('ISOAbbreviation')?.textContent||'';
    let doi = '';
    article.querySelectorAll('ArticleId').forEach(id => { if (id.getAttribute('IdType')==='doi') doi=id.textContent; });
    const allAffils = [...article.querySelectorAll('AffiliationInfo Affiliation')].map(a=>a.textContent);

    article.querySelectorAll('Author').forEach(author => {
      const lastName = author.querySelector('LastName')?.textContent||'';
      const foreName = author.querySelector('ForeName')?.textContent||'';
      if (!lastName) return;

      let affil = author.querySelector('AffiliationInfo Affiliation')?.textContent||'';
      if (!isKorean(affil)) affil = allAffils.find(a=>isKorean(a))||'';
      if (!isKorean(affil)) return;

      const name = `${lastName} ${foreName}`.trim();

      // 한국 성씨 필터 — 소속은 한국인데 이름이 외국인이면 제외
      if (!isKoreanName(name)) return;

      const hospitalKr = extractHospital(affil);
      if (!map[name]) map[name] = { name, affil: hospitalKr, papers:[], paperCount:0, recentScore:0, citationCount:0 };
      if (!map[name].papers.find(p=>p.pmid===pmid)) {
        map[name].papers.push({ title, pmid, doi, year, journal, url:`https://pubmed.ncbi.nlm.nih.gov/${pmid}/`, citationCount:0 });
        map[name].paperCount++;
        map[name].recentScore += year>=2022?1.3:year>=2019?1.1:year>=2016?0.9:0.7;
      }
    });
  });
  return map;
}

// ── Europe PMC ────────────────────────────────────────
async function fetchEuropePMC(pmids) {
  const result = {};
  if (!pmids.length) return result;
  for (let i=0; i<pmids.length; i+=20) {
    const batch = pmids.slice(i,i+20);
    try {
      const q = batch.map(id=>`EXT_ID:${id}`).join(' OR ');
      const data = await fetch(`https://www.ebi.ac.uk/europepmc/webservices/rest/search?query=${encodeURIComponent(q)}&resultType=core&format=json&pageSize=100`).then(r=>r.json());
      (data.resultList?.result||[]).forEach(p => { if (p.pmid && p.citedByCount>0) result[p.pmid]=p.citedByCount; });
    } catch(e) {}
    if (i+20<pmids.length) await new Promise(r=>setTimeout(r,200));
  }
  return result;
}

// ── CrossRef ──────────────────────────────────────────
async function fetchCrossRef(dois) {
  const result = {};
  if (!dois.length) return result;
  await Promise.allSettled(dois.slice(0,30).map(async doi => {
    try {
      const data = await fetch(`https://api.crossref.org/works/${encodeURIComponent(doi)}?select=is-referenced-by-count`).then(r=>r.ok?r.json():null);
      if (data?.message?.['is-referenced-by-count']>0) result[doi]=data.message['is-referenced-by-count'];
    } catch(e) {}
  }));
  return result;
}

// ── OpenCitations ─────────────────────────────────────
async function fetchOpenCitations(pmids) {
  const result = {};
  if (!pmids.length) return result;
  await Promise.allSettled(pmids.slice(0,20).map(async pmid => {
    try {
      const data = await fetch(`https://opencitations.net/index/api/v2/citation-count/pmid:${pmid}`).then(r=>r.ok?r.json():null);
      const count = data?.[0]?.count;
      if (count && parseInt(count)>0) result[pmid]=parseInt(count);
    } catch(e) {}
  }));
  return result;
}

// ── 심평원 프록시 ─────────────────────────────────────
async function fetchHiraViaProxy(doctors, deptCode) {
  const map = {};
  const hospitalNames = [...new Set(Object.values(doctors).map(d=>d.affil).filter(Boolean))];

  for (const hospitalKr of hospitalNames) {
    try {
      const searchName = HIRA_NAME_MAP[hospitalKr] || hospitalKr;
      const searchRes = await fetch(`${HIRA_PROXY}?name=${encodeURIComponent(searchName)}`);
      const searchData = await searchRes.json();
      const items = searchData.response?.body?.items?.item;
      if (!items) continue;

      const item = Array.isArray(items) ? items[0] : items;
      if (!item?.ykiho) continue;

      const detailRes = await fetch(`${HIRA_PROXY}?ykiho=${item.ykiho}`);
      const detailData = await detailRes.json();
      const detailItems = detailData.response?.body?.items?.item;
      if (!detailItems) continue;

      const details = Array.isArray(detailItems) ? detailItems : [detailItems];
      let specialistCount = 0;
      if (deptCode) {
        const dept = details.find(d=>d.dgsbjtCd===deptCode);
        specialistCount = dept ? parseInt(dept.doctorCnt||0) : 0;
      }
      const totalDoctors = details.reduce((sum,d)=>sum+parseInt(d.doctorCnt||0),0);

      map[hospitalKr] = {
        hospType: item.clCdNm||'',
        totalDoctors,
        specialistCount,
        tel: item.telno||'',
      };
    } catch(e) {}
  }
  return map;
}

// ── 정렬 & 렌더 ───────────────────────────────────────
function sortDoctors(key) {
  if (sortKey === key) {
    sortDir *= -1;
  } else {
    sortKey = key;
    sortDir = -1;
  }
  renderTable(document.getElementById('searchInput').value.trim(), hospitalInfoMap);
}

function renderTable(raw, hospMap) {
  const section = document.getElementById('resultsSection');
  const hasHira = Object.keys(hospMap).length > 0;

  const sorted = [...allDoctors].sort((a,b) => {
    let av = a[sortKey] ?? 0;
    let bv = b[sortKey] ?? 0;
    if (sortKey === 'recentYear') {
      av = a.papers[0]?.year || 0;
      bv = b.papers[0]?.year || 0;
    }
    return (bv - av) * sortDir * -1 || 0;
  }).slice(0,20);

  const icon = (key) => {
    if (sortKey !== key) return `<span class="sort-icon">↕</span>`;
    return `<span class="sort-icon active">${sortDir === -1 ? '↓' : '↑'}</span>`;
  };

  let html = `
    <div class="results-header">
      <div class="results-title">"${raw}" 연구 의사</div>
      <div class="results-meta">총 ${sorted.length}명</div>
    </div>
    <div class="source-badges">
      <span class="source-badge active">PubMed</span>
      <span class="source-badge active">Europe PMC</span>
      <span class="source-badge active">CrossRef</span>
      <span class="source-badge active">OpenCitations</span>
      <span class="source-badge ${hasHira?'active':''}">심평원</span>
    </div>
    <div class="note-box">아래 수치는 공개된 논문 데이터 기반입니다. 진료 실력이나 수술 성공률과 직접적인 관계가 없으며, 의사 선택의 참고 자료로만 활용하세요.</div>
    <table class="results-table">
      <thead>
        <tr>
          <th style="width:44px">#</th>
          <th>의사 / 병원</th>
          <th onclick="sortDoctors('citationCount')" class="${sortKey==='citationCount'?'sorted':''}">
            피인용수${icon('citationCount')}
            <button class="info-btn">i<span class="tooltip">다른 연구자들이 인용한 총 횟수.<br>높을수록 연구 영향력이 큽니다.</span></button>
          </th>
          <th onclick="sortDoctors('paperCount')" class="${sortKey==='paperCount'?'sorted':''}">
            논문 수${icon('paperCount')}
            <button class="info-btn">i<span class="tooltip">이 질환 관련 논문 발표 수.<br>해당 분야 연구 깊이를 나타냅니다.</span></button>
          </th>
          <th onclick="sortDoctors('recentYear')" class="${sortKey==='recentYear'?'sorted':''}">
            최근 논문${icon('recentYear')}
            <button class="info-btn">i<span class="tooltip">가장 최근 관련 논문 연도.<br>현재도 연구 중인지를 나타냅니다.</span></button>
          </th>
        </tr>
      </thead>
      <tbody>
  `;

  sorted.forEach((d, i) => {
    const recentYear = d.papers[0]?.year || '-';
    const hospitalInfo = hospMap[d.affil];
    const rowId = `row-${i}`;
    const detailId = `detail-${i}`;

    html += `
      <tr onclick="toggleDetail('${rowId}','${detailId}')" id="${rowId}">
        <td class="td-rank ${i<3?'top':''}">${i+1}</td>
        <td>
          <div class="td-name">${d.name}</div>
          <div class="td-affil">${d.affil||'소속 확인 필요'}</div>
        </td>
        <td class="td-num ${d.citationCount>0?'highlight':''}">${d.citationCount>0?d.citationCount.toLocaleString():'-'}</td>
        <td class="td-num">${d.paperCount}</td>
        <td class="td-year">${recentYear}</td>
      </tr>
      <tr class="detail-row" id="${detailId}">
        <td class="detail-cell" colspan="5">
          <div class="detail-inner">
            ${hospitalInfo ? `
            <div class="hospital-box">
              <div class="hospital-box-title">병원 정보 · 심평원</div>
              <div class="hospital-stats">
                <div><div class="hospital-stat-val">${hospitalInfo.hospType||'-'}</div><div class="hospital-stat-lbl">병원 종류</div></div>
                <div><div class="hospital-stat-val">${hospitalInfo.totalDoctors>0?hospitalInfo.totalDoctors+'명':'-'}</div><div class="hospital-stat-lbl">전체 전문의</div></div>
                ${hospitalInfo.specialistCount>0?`<div><div class="hospital-stat-val">${hospitalInfo.specialistCount}명</div><div class="hospital-stat-lbl">관련과 전문의</div></div>`:''}
                ${hospitalInfo.tel?`<div><div class="hospital-stat-val" style="font-size:12px">${hospitalInfo.tel}</div><div class="hospital-stat-lbl">전화번호</div></div>`:''}
              </div>
            </div>` : ''}
            <div class="papers-title">관련 논문</div>
            ${d.papers.slice(0,5).map(p=>`
              <div class="paper-item">
                <a class="paper-title-link" href="${p.url}" target="_blank" onclick="event.stopPropagation()">${p.title}</a>
                <div class="paper-meta">
                  <span>${p.year}</span><span>${p.journal}</span>
                  ${p.citationCount>0?`<span class="paper-cite">인용 ${p.citationCount}회</span>`:''}
                </div>
              </div>`).join('')}
          </div>
        </td>
      </tr>
    `;
  });

  html += `</tbody></table>`;
  section.innerHTML = html;
}

function toggleDetail(rowId, detailId) {
  const row = document.getElementById(rowId);
  const detail = document.getElementById(detailId);
  const isOpen = detail.classList.contains('open');
  // 다른 열린 행 닫기
  document.querySelectorAll('.detail-row.open').forEach(r => r.classList.remove('open'));
  document.querySelectorAll('tbody tr.expanded').forEach(r => r.classList.remove('expanded'));
  if (!isOpen) {
    detail.classList.add('open');
    row.classList.add('expanded');
  }
}
